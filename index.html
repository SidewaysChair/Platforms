<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        h1 { color: #1a73e8; margin-top: 0; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 2px solid #ddd; border-radius: 6px; font-size: 1rem; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; width: 100%; }
        button:hover { background-color: #1557b0; }
        #message { margin-top: 15px; font-weight: bold; min-height: 1.2em; }
        .stats { font-size: 0.8rem; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Guess My Number</h1>
    <p>I'm thinking of 1 to 100.</p>
    <input type="number" id="guessInput" placeholder="Enter number" min="1" max="100">
    <button onclick="checkGuess()">Guess!</button>
    <div id="message"></div>
    <div class="stats" id="stats">Attempts: 0</div>
</div>

<script>
    let target = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;

    function checkGuess() {
        const input = document.getElementById('guessInput');
        const message = document.getElementById('message');
        const stats = document.getElementById('stats');
        const guess = parseInt(input.value);

        if (isNaN(guess) || guess < 1 || guess > 100) {
            message.textContent = "Please enter 1-100!";
            message.style.color = "orange";
            return;
        }

        attempts++;
        stats.textContent = `Attempts: ${attempts}`;

        if (guess === target) {
            message.textContent = `🎉 Correct! It was ${target}.`;
            message.style.color = "green";
            // Reset after a short delay
            setTimeout(() => {
                if(confirm("Play again?")) location.reload();
            }, 500);
        } else if (guess > target) {
            message.textContent = "Too high! ↓";
            message.style.color = "#d93025";
        } else {
            message.textContent = "Too low! ↑";
            message.style.color = "#d93025";
        }
        
        input.value = "";
        input.focus();
    }
</script>

</body>
</html>
